services:
  dreamstudio:
    image: ghcr.io/crazycherrys/dreamstudio:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      DREAMSTUDIO_SECRET_KEY: ${DREAMSTUDIO_SECRET_KEY}
      COOKIE_SECRET: ${COOKIE_SECRET}
      APP_BASE_URL: ${APP_BASE_URL}
      APP_ALLOWED_ORIGINS: ${APP_ALLOWED_ORIGINS:-}
      NODE_ENV: production
      WEB_PORT: ${WEB_PORT:-3000}
      API_PORT: ${API_PORT:-3001}
      LOCAL_STORAGE_ROOT: ${LOCAL_STORAGE_ROOT:-/data}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-2}
    ports:
      - '${WEB_PORT:-3000}:3000'
      - '${API_PORT:-3001}:3001'
    volumes:
      - dreamstudio_data:/data
    restart: unless-stopped

volumes:
  dreamstudio_data:
